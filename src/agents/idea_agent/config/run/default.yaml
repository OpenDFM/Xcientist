run:
  max_turns: 4
  parallelism: 1
  output_root: "runs"
  console_logs: true
  rag_config: "src/agents/survey_agent/config/outcomeRAG.yaml"
  # Use env var for key, but hardcode working endpoint for URL
  openai_api_key: "${OPENAI_API_KEY}"
  openai_base_url: "https://api.xi-ai.cn/v1"
  s2_api_key: "${SEMANTIC_SCHOLAR_API_KEY}"
  s2_api_timeout: "60"
  serper_api_key: "${SERPER_API_KEY}"
  serper_api_endpoint: "https://google.serper.dev/search"
  mineru_model_source: "modelscope"
  topics: ["Diffusion Models for Reinforcement Learning in Games"]
  mature_idea: "CtrlFlow replaces step-wise dynamics modeling in online MBRL with a conditional flow-matching trajectory generator that directly learns to sample high-return trajectories from initial states, using controllability (minimum control-energy via a non-linear controllability Gramian) plus value guidance to avoid long-horizon model-error compounding and improve sample efficiency."
