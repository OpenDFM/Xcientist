# ============================================
# X-Scientist Unified Configuration
# ============================================

# Global settings
project:
  name: "x-scientist"
  root: "${workspace}/.."  # Auto-resolve to parent directory

# ============================================
# Workspace Configuration
# ============================================
workspace:
  root: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace"

# ============================================
# Survey Agent Configuration
# ============================================
survey:
  # Basic Info (matches config.BasicInfo)
  BasicInfo:
    topic: "Knowledge transfer for LLM"
    base_dir: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace/transfer"
    cache_path: "./database"
    save_path: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace/transfer/survey.md"
    save_json_path: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace/transfer/survey.json"
    evaluation_save_path: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace/transfer/evaluation.txt"
    debug: true
    error_conservatism_mode: false

  # API configuration (matches config.APIInfo)
  APIInfo:
    llm_api_key: "${env:OPENAI_API_KEY}"
    llm_api_base_url: "https://api.xi-ai.cn/v1/chat/completions"
    llm_model_name: "gpt-5-mini"
    llm_max_context_length: 160000
    batch_chat_agent_worker: 4
    semantic_scholar_api_key: "${env:SEMANTIC_SCHOLAR_API_KEY}"
    low_flow_mode: false
    low_flow_latency: 0
    arxiv_api_max_retry: 3
    semantic_scholar_api_max_retry: 3

  # Module configuration (matches config.ModuleInfo)
  ModuleInfo:
    WorkCollector:
      download_safe_mode: false
      cache_enabled: true
      download_workers: 32
      max_seed_paper_num: 5
      reference_graph_depth: 1
      sentence_transformer_model: "sentence-transformers/all-MiniLM-L6-v2"
      sentence_transformer_batch_size: 32
      related_work_top_k: 30
      log_related_work_num: -1
      related_work_threshold: 0.5
      related_work_threshold_for_llm: 4
      relatedness_temperature: 1.0
      RAG_source_use_embedding_filter: true
      RAG_source_use_LLM_filter: false
      RAG_source_downloadable_only: false

    Database:
      default_top_k: 20

    WorkAnalyzer:
      abstract_only_mode: false
      cache_enabled: true
      abstract_when_full_text_fail: false
      paper_reading_temperature: 1.0
      paper_reading_max_retry: 5
      llm_max_context_overhead_length_in_paper_reading: 20000
      clustering_batch_size: 16
      clustering_temperature: 1.0
      clustering_in_steps: true
      clustering_batch_size_in_creation: 32
      clustering_batch_size_in_assignment: 8
      paper_clustering_max_retry: 10
      paper_clustering_creation_max_retry: 3
      paper_clustering_assignment_max_retry: 10
      propose_question_temperature: 1.0
      anwer_question_temperature: 1.0
      intra_cluster_analysis_max_retry: 2
      intra_cluster_analysis_temperature: 1.0
      intra_clustering_probelm_proposing_max_retry: 4

    SurveyGenerator:
      outline_generation_in_steps: true
      outline_generation_draft_max_retry: 3
      outline_generation_draft_batch_size: 20
      outline_draft_RAG_topk: 60
      outline_generation_assign_max_retry: 5
      outline_generation_assign_batch_size: 10
      outline_assign_RAG_topk: 20
      outline_generation_temperature: 0.5
      outline_generation_batch_size: 16
      outline_generation_max_retry: 2
      outline_generation_max_retry_in_generation_loop: 6
      subsection_draft_temperature: 1.0
      subsection_draft_max_retry: 5
      section_draft_max_retry: 5
      section_draft_temperature: 1.0
      draft_refinement_temperature: 1.0
      section_draft_max_error_info_length: 500
      subsection_draft_max_error_info_length: 500
      outline_max_error_info_length: 500
      llm_max_context_overhead_length_generation: 20000
      llm_max_context_overhead_length_outline_generation: 10000
      subsection_least_words: 700
      subsection_least_citations: 15
      section_least_words: 2000
      section_least_citations: 25
      draft_length_relax_ratio: 0.5
      use_full_text_in_survey_generation: false
      include_other_relevant_papers_RAG_in_outline: true
      outline_RAG_topk: 200
      include_other_relevant_papers_RAG: true
      section_RAG_topk: 60
      subsection_RAG_topk: 60
      use_title_in_draft: true
      enable_review_and_revise: true
      section_review_temperature: 1.0
      section_review_retry: 3
      section_revision_RAG_topk: 30
      section_revise_temperature: 0.5
      section_revise_retry: 5
      no_suggestion_run_each_iteration: 1
      max_review_revise_iterations: 30
      draft_refinement_in_parts: true
      valid_title_min_similarity: 0.5

    Judge:
      use_different_api_for_judge: false
      model: "gpt-5-mini"
      judge_llm_api_key: "${env:OPENAI_API_KEY}"
      judge_llm_api_base_url: "https://api.xi-ai.cn/v1/chat/completions"
      nli_temperature: 0.1
      citation_quality_threshold: 0.5
      remove_failed_citation_in_eval: true
      rubrics_eval_10_dimensions: true
      rubrics_eval_4_dimensions: false
      citation_eval: true

# ============================================
# Idea Agent Configuration
# ============================================
idea:
  enabled: true

  # Run settings
  run:
    topics: []
    topics_file: null
    max_turns: 4
    parallelism: 1
    output_root: "runs"
    console_logs: true
    rag_config: "src/agents/survey_agent/config/outcomeRAG.yaml"
    openai_api_key: "${env:OPENAI_API_KEY}"
    openai_base_url: "https://api.xi-ai.cn/v1"
    s2_api_key: "${env:SEMANTIC_SCHOLAR_API_KEY}"
    s2_api_timeout: 60
    serper_api_key: "${env:SERPER_API_KEY}"
    serper_api_endpoint: "https://google.serper.dev/search"
    mineru_model_source: "modelscope"
    mature_idea: ""

  # Agent configuration
  agent:
    model: "gpt-5-mini"
    chat_max_retries: 3
    chat_retry_backoff: 2.0
    action_selection_attempts: 2
    paper_enrichment_timeout_sec: 7200
    semantic_search_limit: 5
    idea_context_limit: 10

  # Search configuration
  search:
    max_retry: 3

  # MCTS configuration
  mcts:
    max_iterations: 3
    max_depth: 3
    branching_factor: 3
    exploration_constant: 1.15
    idea_taste_mode: null
    generation_model: null
    evaluation_model: null
    generation_temperature: 0.7
    evaluation_temperature: 0.001
    generation_max_tokens: 8192
    evaluation_max_tokens: 8192
    component_novelty_model: "all-MiniLM-L6-v2"
    component_novelty_index_dir: null
    component_novelty_retrieval_top_k: 50
    component_novelty_evidence_top_k: 5
    component_novelty_eval_model: null
    component_novelty_eval_temperature: 0.001
    component_novelty_eval_max_tokens: 2048
    min_confidence_for_memory: 0.6
    pareto_top_k: 5

    # Scoring weights
    weights:
      alignment: 0.2
      complexity: 0.2
      novelty: 0.3
      impact: 0.25
      feasibility: 0.2
      clarity: 0.15
      conciseness: 0.1
      risk: 0.2
      protocol: 0.15

    skill_prior_memory_path: "idea_skill_priors"
    skill_prior_success_threshold: 0.6

# ============================================
# Experiment Agent Configuration
# ============================================
experiment:
  enabled: true
  api:
    openai_api_key: "${env:OPENAI_API_KEY}"
    openai_api_base: "https://api.xi-ai.cn/v1"
    minimax_api_key: "${env:MINIMAX_API_KEY}"
    minimax_api_base: "https://api.minimaxi.com/v1"
    huggingface_endpoint: "https://hf-mirror.com"
    github_ai_token: "${env:GITHUB_AI_TOKEN}"
    serper_api_key: "${env:SERPER_API_KEY}"
    jina_api_key: "${env:JINA_API_KEY}"

  # Model configuration
  models:
    prepare: "MiniMax-M2.7"
    code: "MiniMax-M2.7"
    master: "MiniMax-M2.7"
    science: "MiniMax-M2.7"
    default: "MiniMax-M2.7"

  # Execution configuration
  execution:
    max_iterations: 20
    delegate_max_children: 1
    planner_max_turns: 10000
    worker_max_turns: 4000
    prepare_validation_feedback_rounds: 4
    code_validation_feedback_rounds: 2
    science_validation_feedback_rounds: 2
    bash_timeout_seconds: 600000
    mcp_timeout_seconds: 120

  # Memory configuration
  memory:
    enabled: true
    shared_dir: "~/.researchagent/shared_memory"
    embedding_model_path: "/hpc_stor03/sjtu_home/hanqi.li/ckpts/huggingface/all-MiniLM-L6-v2"
    llm_name: "gpt-5-mini"
    query_method: "embedding"
    writeback_enabled: true
    tool_logs_enabled: false
    prompt_injection_enabled: true
    max_slots_per_task: 100

  # Workspace configuration
  workspace:
    root: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace"
    prepare_clone_depth: 1

# ============================================
# Paper Agent Configuration
# ============================================
paper:
  enabled: true
  model: "MiniMax-M2.5"

  api:
    openai_api_key: "${env:OPENAI_API_KEY}"
    openai_api_base: "https://api.xi-ai.cn/v1"
    minimax_api_key: "${env:MINIMAX_API_KEY}"
    minimax_api_base: "https://api.minimaxi.com/v1"
    semantic_scholar_api_key: "${env:SEMANTIC_SCHOLAR_API_KEY}"
    semantic_scholar_api_base: "https://api.semanticscholar.org"

  models:
    default: "MiniMax-M2.5"
    architect: "MiniMax-M2.5"
    writer: "MiniMax-M2.5"
    review: "MiniMax-M2.5"
    analysis: "MiniMax-M2.5"
    literature: "MiniMax-M2.5"
    viz: "MiniMax-M2.5"
    vlm: "gpt-4o"

  workspace:
    root: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/src/agents/paper_agent/workspaces"
    experiment_root: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace"

  template_dir: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/src/agents/paper_agent/latex/ICML2025_Template"

# ============================================
# Pipeline Configuration
# ============================================
pipeline:
  # Pipeline name (generated from topic if not set)
  name: "test"

  # State file for resume
  state_file: "pipeline.yaml"

  # Resume settings
  resume_enabled: true

  # Skip survey if already done
  skip_survey: true

  # Iteration settings
  iterate:
    max_iterations: 5

    # Stop conditions
    stop_conditions:
      min_ideas_generated: 5
      max_consecutive_failures: 3

    # Feedback from experiment to idea agent
    feedback:
      include_metrics: true
      include_errors: true
      max_feedback_length: 8192

  # Output settings
  output:
    root: "pipeline_runs"
    idea_result_filename: "idea_result.json"
    experiment_result_filename: "experiment_result.json"
    resume_from_iteration: null

  symbolic_memory_path: "idea_skill_priors"
  default_macro_roles:
    - "generator"
    - "encoder"
    - "decoder"
    - "loss"
    - "regularizer"
    - "optimizer"
    - "architecture"
    - "attention"
    - "embedding"
    - "representation"
    - "constraint"
    - "retrieval"
    - "augmentation"

# ============================================
# Environment Variable Mapping
# ============================================
env:
  OPENAI_API_KEY: ""
  SEMANTIC_SCHOLAR_API_KEY: ""
  SERPER_API_KEY: ""
  MINIMAX_API_KEY: ""
  GITHUB_AI_TOKEN: ""
  JINA_API_KEY: ""
