# ============================================
# X-Scientist Unified Configuration
# ============================================

# Global settings
project:
  name: "x-scientist"
  root: "${workspace}/.."  # Auto-resolve to parent directory

# ============================================
# Workspace Configuration
# ============================================
workspace:
  root: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace"

# ============================================
# Survey Agent Configuration
# ============================================
survey:
  enabled: true
  topic: "Diffusion Models for RL"

  # Output settings
  output:
    base_dir: "${workspace}/surveys"
    save_path: "${survey.output.base_dir}/survey.md"
    save_json_path: "${survey.output.base_dir}/survey.json"
    evaluation_save_path: "${survey.output.base_dir}/evaluation.txt"

  # API configuration
  api:
    llm_api_key: "${env:OPENAI_API_KEY}"
    llm_api_base_url: "https://api.xi-ai.cn/v1"
    llm_model_name: "gpt-5-mini"
    llm_max_context_length: 160000
    batch_chat_agent_worker: 4
    semantic_scholar_api_key: "${env:SEMANTIC_SCHOLAR_API_KEY}"
    low_flow_mode: false

  # Module configuration
  modules:
    WorkCollector:
      download_safe_mode: false
      cache_enabled: true
      max_seed_paper_num: 5
      reference_graph_depth: 1
      sentence_transformer_model: "sentence-transformers/all-MiniLM-L6-v2"
      related_work_top_k: 30
      related_work_threshold: 0.5
      related_work_threshold_for_llm: 4

    WorkAnalyzer:
      abstract_only_mode: false
      cache_enabled: true
      abstract_when_full_text_fail: false
      clustering_batch_size: 16
      clustering_temperature: 1.0

    SurveyGenerator:
      outline_generation_in_steps: true
      subsection_least_words: 700
      subsection_least_citations: 15
      section_least_words: 2000
      section_least_citations: 25
      enable_review_and_revise: true
      max_review_revise_iterations: 30

    Judge:
      use_different_api_for_judge: false
      model: "gpt-5-mini"
      citation_quality_threshold: 0.5

# ============================================
# Idea Agent Configuration
# ============================================
idea:
  enabled: true
  input: "The core idea of Titans is to explicitly separate short-term context processing from long-term memory in sequence modeling: attention handles precise, local dependencies, while a neural memory module continuously stores and updates important information from much longer histories. In this way, the model can keep reading new tokens while also “remembering” useful past information beyond the standard context window. Intuitively, Titans treats attention as a kind of short-term memory and neural memory as long-term memory, aiming to combine the strengths of Transformers and memory-based recurrent systems for very long-context modeling. Keep the high-level thesis that short-range dependencies are handled by attention and long-range dependencies require persistent memory. However, do not preserve the current Titans memory implementation by default. You may redesign the Transformer-internal memory-attention computation as long as the method remains a unified Transformer architecture rather than an external retrieval system. Focus on mechanism-level architectural innovation inside the block: how memory states are represented, updated across layers/time, read by attention, and integrated into token processing. You may redesign the memory-attention interface, introduce new recurrent/state-space style memory dynamics, or restructure block internals, but avoid drifting into changes that depend on external tools, databases, or agent-level memory engineering."
  #topic: "Long-context Sequence Modeling"
  #mature_idea: "The core idea of Titans is to explicitly separate short-term context processing from long-term memory in sequence modeling: attention handles precise, local dependencies, while a neural memory module continuously stores and updates important information from much longer histories. In this way, the model can keep reading new tokens while also “remembering” useful past information beyond the standard context window. Intuitively, Titans treats attention as a kind of short-term memory and neural memory as long-term memory, aiming to combine the strengths of Transformers and memory-based recurrent systems for very long-context modeling."
  #refinement_scope: "Keep the high-level thesis that short-range dependencies are handled by attention and long-range dependencies require persistent memory. However, do not preserve the current Titans memory implementation by default. You may redesign the Transformer-internal memory-attention computation as long as the method remains a unified Transformer architecture rather than an external retrieval system. Focus on mechanism-level architectural innovation inside the block: how memory states are represented, updated across layers/time, read by attention, and integrated into token processing. You may redesign the memory-attention interface, introduce new recurrent/state-space style memory dynamics, or restructure block internals, but avoid drifting into changes that depend on external tools, databases, or agent-level memory engineering."
  topic: ""
  mature_idea: ""
  refinement_scope: ""

  run:
    LigAgent-Pro: true
    input: "${idea.input}"
    topic: "${idea.topic}"
    mature_idea: "${idea.mature_idea}"
    refinement_scope: "${idea.refinement_scope}"
    input_interpreter_model: "${idea.agent.model}"
    output_root: "runs"
    console_logs: true
    rag_config: "src/agents/survey_agent/config/outcomeRAG.yaml"
    openai_api_key: "sk-TUkxt3aRk2RqY94xEaEd4d5eE66d40298a27279aD83b4b43"
    openai_base_url: "https://api.xi-ai.cn/v1"

  agent:
    model: "gpt-5.4"
    # Workflow-stage model routing for LigAgent's explicit stage graph.
    # If a stage is not set here, it falls back to `idea.agent.model`.
    # This only affects workflow-stage LLM calls; MCTS generation/evaluation
    # and fusion still use their original dedicated configs below.
    workflow_models:
      default: "${idea.agent.model}"

      # Main LigAgent workflow: knowledge_aquisition -> advanced_analysis
      # -> re_analysis_replan -> idea_generation
      main:
        knowledge_aquisition: "${idea.agent.model}"
        advanced_analysis: "${idea.agent.model}"
        re_analysis_replan: "${idea.agent.model}"
        idea_generation: "${idea.agent.model}"

      # Nested knowledge acquisition workflow
      knowledge_acquisition:
        ka_query_generation: "${idea.agent.model}"
        ka_paper_triage: "${idea.agent.model}"

      # Optional flat overrides by stage name if a stage needs to diverge
      # from its workflow bucket later.
      stage_overrides:
        algorithm_structuring: "${idea.agent.model}"
        algorithm_alignment: "${idea.agent.model}"
    chat_max_retries: 3
    chat_retry_backoff: 2.0
    paper_enrichment_timeout_sec: 7200
    experiment_findings_extraction:
      model: "${idea.agent.model}"
      temperature: 0.1
      max_output_tokens: 65536

  mcts:
    max_iterations: 3
    max_depth: 3
    branching_factor: 3
    exploration_constant: 1.2
    idea_taste_mode: "moonshot_inventor"
    # Prompt mode for MCTS generation / retrieval / evaluation.
    # Options:
    #   - default
    #   - conceptual_surprise
    prompt_mode: "conceptual_surprise"
    generation_model: "gpt-5-mini"
    evaluation_model: "gpt-5.4"
    generation_temperature: 0.7
    evaluation_temperature: 0.001
    generation_max_tokens: 65536
    evaluation_max_tokens: 65536
    component_novelty_model: "bge-m3" # /models/
    component_novelty_index_dir: null
    component_novelty_retrieval_top_k: 50
    component_novelty_evidence_top_k: 5
    component_novelty_eval_model: "gpt-5.4"
    component_novelty_eval_temperature: 0.001
    component_novelty_eval_max_tokens: 65536
    mechanism_commit_retrieval_top_k: 3
    mechanism_commit_similarity_threshold: 0.6
    theory_transfer_retrieval_top_k: 3
    theory_transfer_similarity_threshold: 0.6
    enable_vector_memory: true
    enable_symbolic_memory: true
    min_confidence_for_memory: 0.6
    pareto_top_k: 5
    symbolic_memory_path: "output/symbolic_memory"
    skill_prior_success_threshold: 0.7

  fusion:
    enabled: true
    only_when_ligagent_pro: true
    model: "gpt-5.4"
    temperature: 0.7
    max_tokens: 65536
    min_candidates: 2
    repair_max_steps: 10
    repair_patience: 5
    repair_epsilon: 0.02

  memory:
    vector_store:
      model_path: ".cache/all-MiniLM-L6-v2" # /src/memory/memory_system/
      llm_name: "gpt-4.1-mini"
      llm_backend: "openai"

# ============================================
# Experiment Agent Configuration
# ============================================
experiment:
  enabled: true
  api:
    openai_api_key: "${env:OPENAI_API_KEY}"
    openai_api_base: "https://api.xi-ai.cn/v1"
    minimax_api_key: "${env:MINIMAX_API_KEY}"
    minimax_api_base: "https://api.minimaxi.com/v1"
    huggingface_endpoint: "https://hf-mirror.com"
    github_ai_token: "${env:GITHUB_AI_TOKEN}"
    serper_api_key: "${env:SERPER_API_KEY}"
    jina_api_key: "${env:JINA_API_KEY}"

  # Model configuration
  models:
    prepare: "MiniMax-M2.7"
    code: "MiniMax-M2.7"
    master: "MiniMax-M2.7"
    science: "MiniMax-M2.7"
    default: "MiniMax-M2.7"

  # Execution configuration
  execution:
    max_iterations: 20
    delegate_max_children: 1
    planner_max_turns: 10000
    worker_max_turns: 4000
    prepare_validation_feedback_rounds: 4
    code_validation_feedback_rounds: 2
    science_validation_feedback_rounds: 2
    bash_timeout_seconds: 600000
    mcp_timeout_seconds: 120

  # Memory configuration
  memory:
    enabled: true
    shared_dir: "~/.researchagent/shared_memory"
    embedding_model_path: "/hpc_stor03/sjtu_home/hanqi.li/ckpts/huggingface/all-MiniLM-L6-v2"
    llm_name: "gpt-5-mini"
    query_method: "embedding"
    writeback_enabled: true
    tool_logs_enabled: false
    prompt_injection_enabled: true
    max_slots_per_task: 100

  # Workspace configuration
  workspace:
    root: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace"
    prepare_clone_depth: 1

# ============================================
# Paper Agent Configuration
# ============================================
paper:
  enabled: true
  model: "MiniMax-M2.5"

  api:
    openai_api_key: "${env:OPENAI_API_KEY}"
    openai_api_base: "https://api.xi-ai.cn/v1"
    minimax_api_key: "${env:MINIMAX_API_KEY}"
    minimax_api_base: "https://api.minimaxi.com/v1"
    semantic_scholar_api_key: "${env:SEMANTIC_SCHOLAR_API_KEY}"
    semantic_scholar_api_base: "https://api.semanticscholar.org"

  models:
    default: "MiniMax-M2.5"
    architect: "MiniMax-M2.5"
    writer: "MiniMax-M2.5"
    review: "MiniMax-M2.5"
    analysis: "MiniMax-M2.5"
    literature: "MiniMax-M2.5"
    viz: "MiniMax-M2.5"
    vlm: "gpt-4o"

  workspace:
    root: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/src/agents/paper_agent/workspaces"
    experiment_root: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/workspace"

  template_dir: "/hpc_stor03/sjtu_home/hanqi.li/agent_workspace/ResearchAgent/src/agents/paper_agent/latex/ICML2025_Template"

# ============================================
# Pipeline Configuration
# ============================================
pipeline:
  # Pipeline name (generated from topic if not set)
  name: "test"

  # State file for resume
  state_file: "pipeline.yaml"

  # Resume settings
  resume_enabled: true

  # Skip survey if already done
  skip_survey: true

  # Iteration settings
  iterate:
    max_iterations: 5

    # Stop conditions
    stop_conditions:
      min_ideas_generated: 5
      max_consecutive_failures: 3

    # Feedback from experiment to idea agent
    feedback:
      include_metrics: true
      include_errors: true
      max_feedback_length: 8192

  # Output settings
  output:
    root: "pipeline_runs"
    idea_result_filename: "idea_result.json"
    experiment_result_filename: "experiment_result.json"
    resume_from_iteration: null

  symbolic_memory_path: "idea_skill_priors"
  default_macro_roles:
    - "generator"
    - "encoder"
    - "decoder"
    - "loss"
    - "regularizer"
    - "optimizer"
    - "architecture"
    - "attention"
    - "embedding"
    - "representation"
    - "constraint"
    - "retrieval"
    - "augmentation"

