  template_dir: "/hpc_stor03/sjtu_home/zijian.wang/ResearchAgent/src/agents/paper_agent/latex/ICML2025_Template"

# ============================================
# Pipeline Configuration
# ============================================
pipeline:
  # Pipeline name (generated from topic if not set)
  name: "test"

  # State file for resume
  state_file: "pipeline.yaml"

  # Resume settings
  resume_enabled: true

  # Skip survey if already done
  skip_survey: false

  # Iteration settings
  iterate:
    max_iterations: 5

    # Stop conditions
    stop_conditions:
      min_ideas_generated: 5
      max_consecutive_failures: 3

    # Feedback from experiment to idea agent
    feedback:
      include_metrics: true
      include_errors: true
      max_feedback_length: 8192

  # Output settings
  output:
    root: "pipeline_runs"
    idea_result_filename: "idea_result.json"
    experiment_result_filename: "experiment_result.json"
    resume_from_iteration: null

  symbolic_memory_path: "idea_skill_priors"
  default_macro_roles:
    - "generator"
    - "encoder"
    - "decoder"
    - "loss"
    - "regularizer"
    - "optimizer"
    - "architecture"
    - "attention"
    - "embedding"
    - "representation"
    - "constraint"
    - "retrieval"
    - "augmentation"

