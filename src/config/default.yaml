# ============================================
# X-Scientist Unified Configuration
# ============================================

# Global settings
project:
  name: "x-scientist"
  root: "${repo_root}"

# ============================================
# Workspace Configuration
# ============================================
workspace:
  root: "workspace"

# ============================================
# Shared API Configuration
# ============================================
api:
  openai:
    api_key: "${oc.env:OPENAI_API_KEY,}"
    api_base: "${oc.env:OPENAI_API_BASE,}"
    base_url: "${oc.env:OPENAI_BASE_URL,}"
  minimax:
    api_key: "${oc.env:MINIMAX_API_KEY,}"
    base_url: "https://api.minimaxi.com/v1"
  semantic_scholar:
    api_key: "${oc.env:SEMANTIC_SCHOLAR_API_KEY,}"
    base_url: "https://api.semanticscholar.org"
  github_ai:
    token: "${oc.env:GITHUB_AI_TOKEN,}"
  serper:
    api_key: "${oc.env:SERPER_API_KEY,}"
  jina:
    api_key: "${oc.env:JINA_API_KEY,}"
  tavily:
    api_key: "${oc.env:TAVILY_API_KEY,}"
    remote_url_template: "https://mcp.tavily.com/mcp/?tavilyApiKey={api_key}"
  huggingface:
    endpoint: "https://hf-mirror.com"

# ============================================
# Survey Agent Configuration
# ============================================
survey:
  output:
    root_dir: "${repo_root}/src/agents/survey_agent/outputs"
  BasicInfo:
    topic: "Training-Free Memory System for LLM Agents"
    cache_path: "./database"
    debug: false
    error_conservatism_mode: false
    skip_exist: false
    adapter_mode: false
  APIInfo:
    llm_api_key: "${api.openai.api_key}"
    llm_api_base_url: "${api.openai.api_base}"
    llm_model_name: "gpt-5-mini"
    llm_max_context_length: 160000
    use_stream_mode: false
    batch_chat_agent_worker: 16
    chat_timeout: 900
    batch_chat_timeout: 1800
    semantic_scholar_api_key: "${api.semantic_scholar.api_key}"
    low_flow_mode: false
    low_flow_latency: 0
    exponential_backoff: true
    exponential_backoff_time: 1
    exponential_backoff_max_time: 60
    arxiv_api_max_retry: 3
    semantic_scholar_api_max_retry: 3
  ModuleInfo:
    WorkCollector:
      download_safe_mode: false
      download_timeout: 60
      download_in_parallel: true
      download_parallel_workers: 8
      cache_enabled: true
      max_seed_paper_num: 5
      use_seed_filter_LLM: true
      LLM_seed_threshold: 4
      reference_graph_depth: 1
      sentence_transformer_model: models/bge-m3
      sentence_transformer_batch_size: 4
      expand_in_local_paper_graph: false
      advanced_filter_in_local_paper_graph_expansion: true
      related_work_top_k: 30 
      log_related_work_num: -1
      related_work_threshold: 0.5
      related_work_threshold_for_llm: 4
      relatedness_temperature: 0.1
      RAG_source_use_embedding_filter: true
      RAG_source_use_LLM_filter: false
      RAG_source_downloadable_only: false
      use_ds_when_graph_fail: true
    Database:
      default_top_k: 20
    PaperGraphRetriever:
      db_path: data/processed/graph.db
    WorkAnalyzer:
      abstract_only_mode: false
      abstract_when_full_text_fail: true
      cache_enabled: true
      use_local_paper_graph_keynotes: false
      paper_reading_temperature: 0.3
      paper_reading_max_retry: 5
      llm_max_context_overhead_length_in_paper_reading: 20000
      clustering_batch_size: 8
      clustering_temperature: 1.0
      clustering_in_steps: true
      clustering_batch_size_in_creation: 16
      clustering_batch_size_in_assignment: 10
      cluster_assign_fast_mode: true
      paper_clustering_max_retry: 10
      paper_clustering_creation_max_retry: 3
      paper_clustering_assignment_max_retry: 4
      propose_question_temperature: 0.5
      anwer_question_temperature: 0.2
      intra_cluster_analysis_max_retry: 5
      intra_cluster_analysis_temperature: 1.0
      intra_clustering_probelm_proposing_max_retry: 10
      graph_keynote_extraction_batch_retry: 7
      graph_graph_keynote_extraction_temperature: 0.1
      use_ds_keynotes_when_graph_fail: true
    SurveyGenerator:
      include_initial_analysis: false
      include_relation_graph: true
      include_relation_table: true
      include_code_report: false
      include_env_report: false
      omit_error_preserve_retry_time: 2
      outline_generation_in_steps: true
      outline_generation_draft_max_retry: 3
      outline_generation_draft_batch_size: 20
      outline_generation_draft_max_iterations: 5
      outline_generation_draft_empty_keynotes_iteration: 1
      outline_draft_RAG_topk: 60
      outline_generation_assign_max_retry: 10
      outline_generation_assign_batch_size: 20
      outline_assign_RAG_topk: 20
      outline_assign_fast_mode: true
      outline_generation_temperature: 0.5
      outline_generation_batch_size: 16
      outline_generation_max_retry: 3
      outline_generation_max_retry_in_generation_loop: 6
      subsection_draft_temperature: 0.5
      subsection_draft_max_retry: 5
      section_draft_max_retry: 3
      section_draft_temperature: 0.1
      draft_refinement_temperature: 1.0
      section_draft_max_error_info_length: 500
      subsection_draft_max_error_info_length: 500
      outline_max_error_info_length: 500
      llm_max_context_overhead_length_generation: 20000
      llm_max_context_overhead_length_outline_generation: 10000
      subsection_least_words: 3000
      subsection_least_citations: 15
      section_least_words: 100
      section_least_citations: 3
      section_preamable_least_words: 100
      section_preamble_least_words: 100
      section_preamble_least_citations: 3
      draft_length_relax_ratio: 0.1
      use_full_text_in_survey_generation: false
      include_other_relevant_papers_RAG_in_outline: true
      outline_RAG_topk: 200
      include_other_relevant_papers_RAG: true
      section_RAG_topk: 60
      subsection_RAG_topk: 60
      use_title_in_draft: true
      enable_review_and_revise: true
      agentic_refine_section: true
      section_review_temperature: 1.0
      section_review_retry: 3
      reviewer_max_suggestions: 5
      section_revision_RAG_topk: 30
      section_revise_temperature: 0.5
      section_revise_retry: 3
      no_suggestion_run_each_iteration: 2
      max_review_revise_iterations: 3
      draft_refinement_in_parts: true
      refine_in_parts_mode: 2
      draft_refinement_max_retry: 7
      review_and_revise_whole_survey_in_refinement: true
      agentic_refine_survey: true
      review_and_revise_whole_survey_max_iteration: 5
      valid_title_min_similarity: 0.5
    Judge:
      skip_evaluation: false
      use_different_api_for_judge: false
      model: "gpt-5-mini"
      judge_llm_api_key: "${api.openai.api_key}"
      judge_llm_api_base_url: "${api.openai.api_base}"
      nli_temperature: 0.1
      citation_quality_threshold: 0.5
      remove_failed_citation_in_eval: true
      rubrics_eval_10_dimensions: true
      rubrics_eval_4_dimensions: false
      rubrics_deep_survey_eval: false
      explanation_in_rubric: false
      citation_eval: true
    CodeAnalysis:
      PseudoCreator:
        planner_temperature: 0.5
        planner_max_retry: 3


# ============================================
# Idea Agent Configuration
# ============================================
idea:
  enabled: true
  input: ""
  topic: "Training-Free Memory System for LLM Agents"
  mature_idea: ""
  refinement_scope: ""

  run:
    LigAgent-Pro: true
    input: "${idea.input}"
    topic: "${idea.topic}"
    mature_idea: "${idea.mature_idea}"
    refinement_scope: "${idea.refinement_scope}"
    # Optional directory containing exactly one ablation-results JSON file.
    ablation_results_path: ""
    input_interpreter_model: "${idea.agent.model}"
    output_root: "runs"
    console_logs: true
    rag_config: "src/config/default.yaml"
    openai_api_key: "${api.openai.api_key}"
    openai_base_url: "${api.openai.base_url}"

  agent:
    model: "gpt-5.4"
    paper_keynote_keep_top_k: 10
    workflow_models:
      default: "${idea.agent.model}"
      main:
        knowledge_aquisition: "${idea.agent.model}"
        advanced_analysis: "${idea.agent.model}"
        re_analysis_replan: "${idea.agent.model}"
        idea_generation: "${idea.agent.model}"

      # Nested knowledge acquisition workflow
      knowledge_acquisition:
        ka_query_generation: "${idea.agent.model}"
        ka_paper_triage: "${idea.agent.model}"

      # Optional flat overrides by stage name if a stage needs to diverge
      # from its workflow bucket later.
      stage_overrides:
        algorithm_structuring: "${idea.agent.model}"
        algorithm_alignment: "${idea.agent.model}"
    chat_max_retries: 3
    chat_retry_backoff: 2.0
    paper_enrichment_timeout_sec: 7200
    experiment_findings_extraction:
      model: "${idea.agent.model}"
      temperature: 0.1
      max_output_tokens: 65536

  mcts:
    max_iterations: 64
    max_depth: 3
    branching_factor: 3
    exploration_constant: 1.2
    idea_taste_mode: "moonshot_inventor"
    # Prompt mode for MCTS generation / retrieval / evaluation.
    # Options:
    #   - default
    #   - conceptual_surprise
    prompt_mode: "conceptual_surprise"
    generation_model: "gpt-5-mini"
    evaluation_model: "gpt-5.4"
    generation_temperature: 0.7
    evaluation_temperature: 0.001
    generation_max_tokens: 16384
    evaluation_max_tokens: 16384
    component_novelty_model_path: "${repo_root}/models/bge-m3"
    component_novelty_index_dir: null
    component_novelty_retrieval_top_k: 50
    component_novelty_evidence_top_k: 5
    component_novelty_eval_model: "gpt-5.4"
    component_novelty_eval_temperature: 0.001
    component_novelty_eval_max_tokens: 16384
    mechanism_commit_retrieval_top_k: 3
    mechanism_commit_similarity_threshold: 0.6
    theory_transfer_retrieval_top_k: 3
    theory_transfer_similarity_threshold: 0.6
    enable_vector_memory: true
    enable_symbolic_memory: true
    min_confidence_for_memory: 0.6
    pareto_top_k: 5
    symbolic_memory_path: "output/symbolic_memory"
    skill_prior_success_threshold: 0.7

  fusion:
    enabled: true
    only_when_ligagent_pro: true
    model: "gpt-5.4"
    temperature: 0.7
    max_tokens: 65536
    min_candidates: 2
    repair_max_steps: 10
    repair_patience: 5
    repair_epsilon: 0.02

  memory:
    vector_store:
      model_path: "${repo_root}/models/all-MiniLM-L6-v2"
      llm_name: "gpt-4.1-mini"
      llm_backend: "openai"

# ============================================
# Experiment Agent Configuration
# ============================================
experiment:
  enabled: true
  backend: "claude_code"

  claude_code:
    binary: "claude"
    default_model: "mimo-v2.5-pro"
    role_models:
      planner: "mimo-v2.5-pro"
      worker: "mimo-v2.5-pro"
      validator: "mimo-v2.5-pro"
      master: "mimo-v2.5-pro"
      integrator: "mimo-v2.5-pro"
    permission_mode: "bypassPermissions"
    dangerously_skip_permissions: true
    use_bare: false
    settings_sources: "project"
    global_settings_path: "~/.claude/settings.json"
    global_client_config_path: "~/.claude.json"
    mcp_config_path: ""
    strict_mcp_config: false
    no_session_persistence: true
    debug_filter: "api"
    debug_file: "logs/claude_code/claude_debug.log"
    timeout_seconds: 7200
    max_budget_usd: 0

  external_tools:
    huggingface_endpoint: "https://hf-mirror.com"
    github_ai_token: "${env:GITHUB_AI_TOKEN}"
    serper_api_key: "${env:SERPER_API_KEY}"
    jina_api_key: "${env:JINA_API_KEY}"

  # Execution configuration
  execution:
    max_iterations: 20
    delegate_max_children: 1
    planner_max_turns: 10000
    worker_max_turns: 4000
    prepare_validation_feedback_rounds: 4
    code_validation_feedback_rounds: 2
    science_validation_feedback_rounds: 2
    bash_timeout_seconds: 600000
    mcp_timeout_seconds: 120
    slurm:
      partition: "gpu_llm"
      gpus: 8
      gpu_type: "NVIDIA A800-80G"
      cpu_cores: 60
      memory: "128G"
      time_limit: "24:00:00"
      log_dir_template: "{workspace}/logs/slurm"
      job_name_template: "{experiment_condition}_{pde_type}_{timestamp}"

  # Memory configuration
  memory:
    enabled: true
    shared_dir: "~/.researchagent/shared_memory"
    embedding_model_path: "${repo_root}/models/all-MiniLM-L6-v2"
    llm_name: "gpt-5-mini"
    query_method: "embedding"
    writeback_enabled: true
    tool_logs_enabled: false
    prompt_injection_enabled: true
    max_slots_per_task: 100

  # Workspace configuration
  workspace:
    root: "${workspace.root}"
    prepare_clone_depth: 1
    model_candidate_seed: "~/.researchagent/model_seed/"
    tavily_enabled: true
    tavily_api_key: "${env:TAVILY_API_KEY}"
    tavily_remote_url_template: "https://mcp.tavily.com/mcp/?tavilyApiKey={api_key}"

# ============================================
# Blog Agent Configuration
# ============================================
blog:
  source_workspace_root: "${workspace.root}"

  # MiniMax API (default)
  minimax:
    api_key: "${api.minimax.api_key}"
    base_url: "${api.minimax.base_url}"

  # OpenAI API (optional)
  openai:
    api_key: "${api.openai.api_key}"
    base_url: "https://api-2.xi-ai.cn/v1"

  # Google Gemini API (optional)
  gemini:
    api_key: ""
    base_url: "https://api.xi-ai.cn/v1"

  # GenGraph (image generation for figures)
  gengraph:
    provider: "xiai"  # Select your preferred provider
    api_key: ""
    providers:  # Default configuration for each provider, can be customized
      xiai:
        base_url: "https://api.xi-ai.cn/v1"
        model: "gemini-3-pro-image-preview"
      openrouter:
        base_url: "https://openrouter.ai/api/v1"
        model: "google/gemini-3-pro-image-preview"
      bianxie:
        base_url: "https://api.bianxie.ai/v1"
        model: "gemini-3-pro-image-preview"
      gemini:
        base_url: "https://generativelanguage.googleapis.com/v1beta"
        model: "gemini-3-pro-image-preview"

  # DeepEraser (text removal)
  deeperaser:
    use_cuda: false  # Whether to use GPU

  # Semantic Scholar API (for paper abstract retrieval and PDF download)
  semantic_scholar:
    api_key: "${api.semantic_scholar.api_key}"  # Optional: your Semantic Scholar API key

  # Default Model settings (It is only used when you do not pass the model parameter when creating an agent.)
  model: "MiniMax-M2.5"

  # Blog Illustrate settings
  illustrate:
    only_gen_img: true  # true: only generate images, no OCR; false: generate + OCR cleanup

# ============================================
# Pipeline Configuration
# ============================================
pipeline:
  # Pipeline name (generated from topic if not set)
  name: "test"

  # State file for resume
  state_file: "pipeline.yaml"

  # Resume settings
  resume_enabled: true

  # Skip survey if already done
  skip_survey: false

  # Iteration settings
  iterate:
    max_iterations: 5

    # Stop conditions
    stop_conditions:
      min_ideas_generated: 5
      max_consecutive_failures: 3

    # Feedback from experiment to idea agent
    feedback:
      include_metrics: true
      include_errors: true
      max_feedback_length: 8192

  # Output settings
  output:
    root: "pipeline_runs"
    idea_result_filename: "idea_result.json"
    experiment_result_filename: "experiment_result.json"
    resume_from_iteration: null

  symbolic_memory_path: "idea_skill_priors"
  default_macro_roles:
    - "generator"
    - "encoder"
    - "decoder"
    - "loss"
    - "regularizer"
    - "optimizer"
    - "architecture"
    - "attention"
    - "embedding"
    - "representation"
    - "constraint"
    - "retrieval"
    - "augmentation"
